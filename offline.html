<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>غير متصل بالإنترنت | تعلم الكورية</title>
    <meta name="theme-color" content="#1a1a2e">
    <style>
        /* لا نعتمد على أي خط أو CDN خارجي هنا لأن هذه الصفحة
           يجب أن تعمل بدون إنترنت بشكل كامل */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body {
            height: 100%;
            font-family: 'Segoe UI', Tahoma, Arial, sans-serif;
        }
        body {
            background: linear-gradient(180deg, #ffd3eb 0%, #f4cbff 40%, #e2d2ff 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
            text-align: center;
        }
        .offline-card {
            background: rgba(255,255,255,0.55);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-radius: 24px;
            border: 1px solid rgba(255,255,255,0.7);
            padding: 36px 24px;
            max-width: 360px;
            width: 100%;
            box-shadow: 0 10px 30px rgba(120, 60, 140, 0.15);
        }
        .offline-emoji {
            font-size: 56px;
            margin-bottom: 12px;
        }
        h1 {
            font-size: 18px;
            font-weight: 900;
            color: #3a225d;
            margin-bottom: 8px;
        }
        p {
            font-size: 14px;
            color: #7d639b;
            line-height: 1.7;
            margin-bottom: 22px;
        }
        button {
            background: linear-gradient(135deg, #ff6b6b 0%, #ff4757 100%);
            color: #fff;
            border: none;
            padding: 12px 28px;
            border-radius: 999px;
            font-weight: 700;
            font-size: 14px;
            cursor: pointer;
            font-family: inherit;
            box-shadow: 0 6px 18px rgba(255,71,87,0.35);
        }
        button:active { transform: scale(0.97); }
        .hint {
            margin-top: 16px;
            font-size: 12px;
            color: #9b87b8;
        }
    </style>
  <link rel="manifest" href="/My-Korean-app/manifest.json">
  <link rel="apple-touch-icon" href="/My-Korean-app/icon-192.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="تعلم الكورية">
</head>
<body>
    <div class="offline-card">
        <div class="offline-emoji">📡</div>
        <h1>لا يوجد اتصال بالإنترنت</h1>
        <p>
            هذه الصفحة تحتاج إلى اتصال بالإنترنت لأول مرة لتحميلها.
            تأكد من اتصالك بالشبكة وحاول مجدداً، أو عُد إلى الرئيسية
            (المحفوظة لديك بدون إنترنت).
        </p>
        <button onclick="location.reload()">إعادة المحاولة</button>
        <div class="hint">
            💡 الأقسام التي زرتها سابقاً تعمل بدون إنترنت تلقائياً.
        </div>
    </div>
</body>
</html>
